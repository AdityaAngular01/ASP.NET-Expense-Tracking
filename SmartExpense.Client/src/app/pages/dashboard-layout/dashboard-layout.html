<div class="min-h-screen bg-black text-white flex">

  <!-- SIDEBAR -->
  <aside
    class="w-72 bg-gray-950 border-r border-gray-800 hidden lg:flex flex-col">

    <!-- Logo -->
    <div class="p-8 border-b border-gray-800">
      <h1 class="text-3xl font-bold text-green-400">
        SmartExpense
      </h1>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-6 space-y-3">

      @for (sideLink of dashboardSideLinks; track sideLink.title) {

        <a
          [routerLink]="sideLink.link"
          routerLinkActive
          #rla="routerLinkActive"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-4 px-5 py-4 rounded-2xl text-white font-semibold transition"
          [ngClass]="{
            'bg-green-500 text-white': rla.isActive,
            'hover:bg-gray-900': !rla.isActive
          }"
        >
          {{ sideLink.icon }} {{ sideLink.title }}
        </a>

      }
